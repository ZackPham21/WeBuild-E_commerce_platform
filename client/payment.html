<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment — WeBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
  :root {
    --ink: #0d0d0d;
    --paper: #faf8f4;
    --accent: #c8502a;
    --accent2: #2a6bc8;
    --muted: #7a7570;
    --border: #ddd9d2;
    --card: #ffffff;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }

  nav {
    background: var(--ink);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .brand { font-family: 'Playfair Display', serif; font-size: 22px; color: white; text-decoration: none; }
  .brand span { color: var(--accent); }
  .back-btn { color: #aaa; text-decoration: none; font-size: 14px; }
  .back-btn:hover { color: white; }

  .page { max-width: 900px; margin: 48px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 360px; gap: 40px; align-items: start; }

  /* Left */
  h1 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
    margin: 28px 0 18px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 7px; }
  input, select {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--card);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--ink); }
  input::placeholder { color: #c0bbb6; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Card visual */
  .card-preview {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
    border-radius: 14px;
    padding: 24px;
    color: white;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    height: 180px;
  }
  .card-preview::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, #c8502a22, transparent 70%);
    top: -50px; right: -50px;
  }
  .card-chip { width: 40px; height: 30px; background: linear-gradient(135deg, #d4af37, #f5d04e); border-radius: 5px; margin-bottom: 20px; }
  .card-number-display { font-size: 18px; letter-spacing: 3px; margin-bottom: 20px; color: #ffffff99; font-family: monospace; }
  .card-number-display span { color: white; }
  .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .card-holder-label, .card-expiry-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #ffffff55; margin-bottom: 4px; }
  .card-holder-value, .card-expiry-value { font-size: 14px; font-weight: 600; }

  /* Shipping options */
  .shipping-option {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .shipping-option:hover { border-color: var(--ink); }
  .shipping-option.selected { border-color: var(--accent); background: #fdf8f6; }
  .shipping-option input[type=radio] { display: none; }
  .shipping-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .shipping-info p { font-size: 13px; color: var(--muted); }
  .shipping-price { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); }

  .error { background: #fdf0ed; border-left: 3px solid var(--accent); color: var(--accent); padding: 12px 16px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; display: none; }

  .btn-pay {
    width: 100%; padding: 16px;
    background: var(--accent); color: white;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px;
  }
  .btn-pay:hover { background: #b04020; }
  .btn-pay:active { transform: scale(0.99); }
  .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid #ffffff44; border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right: Order summary */
  .summary {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: sticky;
    top: 20px;
  }
  .summary h3 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; }
  .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .summary-item:last-child { border: none; }
  .summary-item.total { font-weight: 700; font-size: 18px; margin-top: 4px; }
  .summary-item.total .amount { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--accent); }
  .secure-note { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

  @media (max-width: 768px) { .page { grid-template-columns: 1fr; padding: 0 20px; } .summary { position: static; } }
</style>
</head>
<body>
<nav>
    <a class="brand" href="index.html">We<span>Build</span></a>
    <a class="back-btn" id="backBtn" href="index.html">← Back</a>
</nav>

<div class="page">
    <div>
        <h1>Checkout</h1>
        <p class="subtitle">Complete your purchase for <strong id="itemNameDisplay">—</strong></p>

        <div class="error" id="errorBox"></div>

        <div class="section-title">Shipping Method</div>
        <label class="shipping-option selected" id="stdOption" onclick="selectShipping(false)">
            <input type="radio" name="shipping" checked>
            <div class="shipping-info">
                <h4>Standard Shipping</h4>
                <p id="stdDays">7 business days</p>
            </div>
            <div class="shipping-price" id="stdPrice">$10</div>
        </label>
        <label class="shipping-option" id="expOption" onclick="selectShipping(true)">
            <input type="radio" name="shipping">
            <div class="shipping-info">
                <h4>Expedited Shipping</h4>
                <p id="expDays">2-3 business days</p>
            </div>
            <div class="shipping-price" id="expPrice">$25</div>
        </label>

        <div class="section-title">Card Details</div>

        <div class="card-preview">
            <div class="card-chip"></div>
            <div class="card-number-display" id="cardDisplay">•••• •••• •••• ••••</div>
            <div class="card-bottom">
                <div>
                    <div class="card-holder-label">Card Holder</div>
                    <div class="card-holder-value" id="cardHolderDisplay">YOUR NAME</div>
                </div>
                <div>
                    <div class="card-expiry-label">Expires</div>
                    <div class="card-expiry-value" id="cardExpiryDisplay">MM/YY</div>
                </div>
            </div>
        </div>

        <div class="field">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)">
        </div>
        <div class="field">
            <label>Card Holder Name</label>
            <input type="text" id="cardHolderName" placeholder="As it appears on card" oninput="updatePreview()">
        </div>
        <div class="grid-2">
            <div class="field">
                <label>Expiration Date</label>
                <input type="text" id="expirationDate" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
            </div>
            <div class="field">
                <label>Security Code</label>
                <input type="text" id="securityCode" placeholder="CVV" maxlength="4">
            </div>
        </div>

        <button class="btn-pay" id="payBtn" onclick="pay()">
            <span id="payBtnText">Complete Payment</span>
            <div class="spinner" id="paySpinner"></div>
        </button>
    </div>

    <!-- Right: Order Summary -->
    <div class="summary">
        <h3>Order Summary</h3>
        <div class="summary-item"><span id="summaryItemName">Item</span><span id="summaryBid">$—</span></div>
        <div class="summary-item"><span id="summaryShipLabel">Standard Shipping</span><span id="summaryShip">$—</span></div>
        <div class="summary-item total"><span>Total</span><span class="amount" id="summaryTotal">$—</span></div>
        <div class="secure-note">🔒 Payments are secure. Card numbers are never stored.</div>
    </div>
</div>

<script src="shared.js"></script>
<script>
  requireAuth();
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get("id");
  if (!itemId) window.location.href = "index.html";

  document.getElementById("backBtn").href = `item-detail.html?id=${itemId}`;

  let expedited = false;
  let shippingCost = 0;
  let expeditedCost = 0;
  let winningBid = 0;

  async function loadData() {
    const [itemRes, stateRes] = await Promise.all([
      apiFetch(`/items/${itemId}`),
      apiFetch(`/auction/state/${itemId}`)
    ]);
    const item = await itemRes.json();
    const state = await stateRes.json();
    winningBid = parseFloat(state.currentHighestBid);
    shippingCost = item.shippingCost;
    expeditedCost = item.expeditedShippingCost;

    document.getElementById("itemNameDisplay").textContent = item.name;
    document.getElementById("summaryItemName").textContent = item.name;
    document.getElementById("summaryBid").textContent = `$${winningBid}`;
    document.getElementById("stdPrice").textContent = `$${shippingCost}`;
    document.getElementById("expPrice").textContent = `$${expeditedCost}`;
    document.getElementById("stdDays").textContent = `${item.shippingDays} business days`;
    updateTotal();
  }

  function selectShipping(isExpedited) {
    expedited = isExpedited;
    document.getElementById("stdOption").classList.toggle("selected", !isExpedited);
    document.getElementById("expOption").classList.toggle("selected", isExpedited);
    document.getElementById("summaryShipLabel").textContent = isExpedited ? "Expedited Shipping" : "Standard Shipping";
    updateTotal();
  }

  function updateTotal() {
    const ship = expedited ? expeditedCost : shippingCost;
    document.getElementById("summaryShip").textContent = `$${ship}`;
    document.getElementById("summaryTotal").textContent = `$${(winningBid + ship).toFixed(2)}`;
  }

  function formatCard(el) {
    let v = el.value.replace(/\D/g, "").substring(0, 16);
    el.value = v.replace(/(.{4})/g, "$1 ").trim();
    const last4 = v.slice(-4) || "••••";
    const masked = v.length > 0 ? `•••• •••• •••• ${last4.padStart(4, "•")}` : "•••• •••• •••• ••••";
    document.getElementById("cardDisplay").textContent = masked;
  }

  function formatExpiry(el) {
    let v = el.value.replace(/\D/g, "").substring(0, 4);
    if (v.length >= 3) v = v.slice(0,2) + "/" + v.slice(2);
    el.value = v;
    document.getElementById("cardExpiryDisplay").textContent = v || "MM/YY";
  }

  function updatePreview() {
    const name = document.getElementById("cardHolderName").value || "YOUR NAME";
    document.getElementById("cardHolderDisplay").textContent = name.toUpperCase();
  }

  async function pay() {
    const cardNumber = document.getElementById("cardNumber").value.replace(/\s/g, "");
    const cardHolderName = document.getElementById("cardHolderName").value.trim();
    const expirationDate = document.getElementById("expirationDate").value.trim();
    const securityCode = document.getElementById("securityCode").value.trim();
    const err = document.getElementById("errorBox");
    err.style.display = "none";

    if (!cardNumber || !cardHolderName || !expirationDate || !securityCode) {
      err.textContent = "Please fill in all card details."; err.style.display = "block"; return;
    }

    const btn = document.getElementById("payBtn");
    const btnText = document.getElementById("payBtnText");
    const spinner = document.getElementById("paySpinner");
    btn.disabled = true; btnText.textContent = "Processing..."; spinner.style.display = "block";

    try {
      const res = await apiFetch("/payment", {
        method: "POST",
        body: JSON.stringify({ itemId: parseInt(itemId), expedited, cardNumber, cardHolderName, expirationDate, securityCode })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        window.location.href = `receipt.html?id=${itemId}`;
      } else {
        err.textContent = data.message || "Payment failed. Please check your card details.";
        err.style.display = "block";
      }
    } catch (e) {
      err.textContent = "Cannot connect to server."; err.style.display = "block";
    } finally {
      btn.disabled = false; btnText.textContent = "Complete Payment"; spinner.style.display = "none";
    }
  }

  loadData();
</script>
</body>
</html>
