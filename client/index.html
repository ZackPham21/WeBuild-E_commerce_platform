<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Auctions — WeBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
  :root {
    --ink: #0d0d0d;
    --paper: #faf8f4;
    --accent: #c8502a;
    --accent2: #2a6bc8;
    --muted: #7a7570;
    --border: #ddd9d2;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }

  /* NAV */
  nav {
    background: var(--ink);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .brand { font-family: 'Playfair Display', serif; font-size: 22px; color: white; text-decoration: none; }
  .brand span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 24px; }
  .nav-user { color: #9a9590; font-size: 14px; }
  .nav-user strong { color: white; }
  .btn-signout {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 7px 16px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-signout:hover { border-color: var(--accent); color: var(--accent); }

  /* HERO */
  .hero {
    background: var(--ink);
    padding: 60px 40px 48px;
    color: white;
  }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 48px; line-height: 1.1; margin-bottom: 12px; }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { color: #9a9590; font-size: 16px; max-width: 500px; margin-bottom: 28px; }

  .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .search-input-wrap { position: relative; flex: 1; min-width: 240px; max-width: 400px; }
  .search-input-wrap input {
    width: 100%;
    padding: 13px 16px 13px 44px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input-wrap input:focus { border-color: var(--accent); }
  .search-input-wrap input::placeholder { color: #555; }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: #555; font-size: 16px;
  }
  .btn-search {
    padding: 13px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-search:hover { background: #b04020; }

  /* FILTERS */
  .filters {
    padding: 20px 40px;
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-right: 4px; }
  .chip {
    padding: 7px 16px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .chip:hover { border-color: var(--ink); }
  .chip.active { background: var(--ink); color: white; border-color: var(--ink); }

  /* MAIN */
  .main { padding: 36px 40px; }
  .results-info { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .results-info strong { color: var(--ink); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: var(--ink);
    display: block;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }

  .card-img {
    height: 180px;
    background: linear-gradient(135deg, #f0ece4 0%, #e0dcd4 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    position: relative;
  }
  .card-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: #22c55e;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-badge.ending { background: var(--accent); }

  .card-body { padding: 18px; }
  .card-category { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 4px; line-height: 1.2; }
  .card-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--border); padding-top: 14px; }
  .bid-info {}
  .bid-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .bid-amount { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); }
  .timer { text-align: right; }
  .timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .timer-value { font-size: 14px; font-weight: 600; color: var(--ink); }
  .timer-value.urgent { color: var(--accent); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--ink); margin-bottom: 8px; }

  .loading {
    display: flex;
    justify-content: center;
    padding: 80px;
  }
  .loading-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 5px;
    animation: bounce 0.8s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.15s; }
  .loading-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }

  .category-emoji { font-size: 48px; }
</style>
</head>
<body>

<nav>
    <a class="brand" href="index.html">We<span>Build</span></a>
    <div class="nav-right">
        <span class="nav-user">Signed in as <strong id="navUsername"></strong></span>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
</nav>

<div class="hero">
    <h1>Live <em>Auctions</em><br>happening now</h1>
    <p>Place your bid before the timer runs out. Highest bid wins.</p>
    <div class="search-row">
        <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search items..." onkeydown="if(event.key==='Enter') search()">
        </div>
        <button class="btn-search" onclick="search()">Search</button>
        <button class="btn-search" style="background:#333;" onclick="clearSearch()">All Items</button>
    </div>
</div>

<div class="filters">
    <span class="filter-label">Category:</span>
    <button class="chip active" onclick="filterCategory(this, '')">All</button>
    <button class="chip" onclick="filterCategory(this, 'Electronics')">Electronics</button>
    <button class="chip" onclick="filterCategory(this, 'Accessories')">Accessories</button>
    <button class="chip" onclick="filterCategory(this, 'Antiques')">Antiques</button>
    <button class="chip" onclick="filterCategory(this, 'Sports')">Sports</button>
    <button class="chip" onclick="filterCategory(this, 'Furniture')">Furniture</button>
</div>

<div class="main">
    <p class="results-info" id="resultsInfo"></p>
    <div id="grid" class="grid">
        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</div>

<script src="shared.js"></script>
<script>
  requireAuth();
  document.getElementById("navUsername").textContent = getUsername();

  const EMOJI = { Electronics: "💻", Accessories: "⌚", Antiques: "🏺", Sports: "🚴", Furniture: "🛋️" };

  let allItems = [];
  let activeCategory = "";

  async function loadItems(url = "/items") {
    document.getElementById("grid").innerHTML = `<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;
    try {
      const res = await apiFetch(url);
      const data = await res.json();
      allItems = Array.isArray(data) ? data : (data.value || []);
      renderItems(allItems);
    } catch (e) {
      document.getElementById("grid").innerHTML = `<div class="empty"><h3>Could not load items</h3><p>Make sure all services are running.</p></div>`;
    }
  }

  function renderItems(items) {
    const grid = document.getElementById("grid");
    const info = document.getElementById("resultsInfo");
    if (!items.length) {
      grid.innerHTML = `<div class="empty"><h3>No items found</h3><p>Try a different search or category.</p></div>`;
      info.textContent = "No results found.";
      return;
    }
    info.innerHTML = `Showing <strong>${items.length}</strong> active auction${items.length !== 1 ? "s" : ""}`;
    grid.innerHTML = items.map(item => {
      const emoji = EMOJI[item.category] || "📦";
      const endTime = new Date(item.auctionEndTime);
      const secsLeft = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
      const timeStr = formatTime(secsLeft);
      const urgent = secsLeft < 3600;
      return `
        <a class="card" href="item-detail.html?id=${item.id}">
          <div class="card-img">
            <span class="category-emoji">${emoji}</span>
            <span class="card-badge ${urgent ? 'ending' : ''}">${urgent ? 'Ending Soon' : 'Live'}</span>
          </div>
          <div class="card-body">
            <div class="card-category">${item.category}</div>
            <div class="card-name">${item.name}</div>
            <div class="card-desc">${item.description}</div>
            <div class="card-footer">
              <div class="bid-info">
                <div class="bid-label">Current Bid</div>
                <div class="bid-amount">$${item.startingPrice}</div>
              </div>
              <div class="timer">
                <div class="timer-label">Time Left</div>
                <div class="timer-value ${urgent ? 'urgent' : ''}">${timeStr}</div>
              </div>
            </div>
          </div>
        </a>`;
    }).join("");
  }

  function formatTime(secs) {
    if (secs <= 0) return "Ended";
    const d = Math.floor(secs / 86400);
    const h = Math.floor((secs % 86400) / 3600);
    const m = Math.floor((secs % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m ${secs % 60}s`;
  }

  function search() {
    const kw = document.getElementById("searchInput").value.trim();
    if (!kw) { loadItems(); return; }
    loadItems(`/items/search?keyword=${encodeURIComponent(kw)}`);
  }

  function clearSearch() {
    document.getElementById("searchInput").value = "";
    activeCategory = "";
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    document.querySelector(".chip").classList.add("active");
    loadItems();
  }

  function filterCategory(el, cat) {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    activeCategory = cat;
    loadItems(cat ? `/items/category/${cat}` : "/items");
  }

  loadItems();
  // Refresh bids every 15 seconds
  setInterval(() => loadItems(activeCategory ? `/items/category/${activeCategory}` : "/items"), 15000);
</script>
</body>
</html>
