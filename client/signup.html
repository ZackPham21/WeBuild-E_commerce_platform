<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — WeBuild Auctions</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
  :root {
    --ink: #0d0d0d;
    --paper: #faf8f4;
    --accent: #c8502a;
    --accent2: #2a6bc8;
    --muted: #7a7570;
    --border: #ddd9d2;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px;
  }
  .wrapper { width: 100%; max-width: 560px; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--ink);
    text-decoration: none;
  }
  .brand span { color: var(--accent); }
  .signin-link { font-size: 14px; color: var(--muted); }
  .signin-link a { color: var(--accent); font-weight: 500; text-decoration: none; }
  .signin-link a:hover { text-decoration: underline; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 28px 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 7px; }
  input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--card);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--ink); }
  input::placeholder { color: #c0bbb6; }
  input.err { border-color: var(--accent); }

  .error {
    background: #fdf0ed;
    border-left: 3px solid var(--accent);
    color: var(--accent);
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }
  .success {
    background: #edf7f0;
    border-left: 3px solid #2a8c52;
    color: #2a8c52;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn:hover { background: #222; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #bbb; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #ffffff44;
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .progress-dot {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    flex: 1;
    transition: background 0.3s;
  }
  .progress-dot.active { background: var(--accent); }
</style>
</head>
<body>
<div class="wrapper">
    <div class="top-bar">
        <a class="brand" href="index.html">We<span>Build</span></a>
        <span class="signin-link">Already a member? <a href="signin.html">Sign in</a></span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Join WeBuild and start bidding on live auctions today.</p>

    <div class="progress">
        <div class="progress-dot active" id="p1"></div>
        <div class="progress-dot" id="p2"></div>
    </div>

    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox"></div>

    <!-- Step 1: Account -->
    <div id="step1">
        <div class="section-label">Account Details</div>
        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="choose a username" autocomplete="username">
        </div>
        <div class="grid-2">
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="min 8 characters" autocomplete="new-password">
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="repeat password" autocomplete="new-password">
            </div>
        </div>
        <div class="grid-2">
            <div class="field">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="First">
            </div>
            <div class="field">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Last">
            </div>
        </div>
        <button class="btn" onclick="nextStep()">Continue to Address →</button>
    </div>

    <!-- Step 2: Address -->
    <div id="step2" style="display:none">
        <div class="section-label">Shipping Address</div>
        <div class="grid-2">
            <div class="field">
                <label>Street Number</label>
                <input type="text" id="streetNumber" placeholder="123">
            </div>
            <div class="field">
                <label>Street Name</label>
                <input type="text" id="streetName" placeholder="Main St">
            </div>
        </div>
        <div class="grid-2">
            <div class="field">
                <label>City</label>
                <input type="text" id="city" placeholder="Toronto">
            </div>
            <div class="field">
                <label>Country</label>
                <input type="text" id="country" placeholder="Canada">
            </div>
        </div>
        <div class="field">
            <label>Postal Code</label>
            <input type="text" id="postalCode" placeholder="M5H 2N2" style="max-width:200px">
        </div>
        <div style="display:flex; gap:12px; margin-top:8px;">
            <button class="btn" style="background:#eee; color:var(--ink); flex:0 0 120px;" onclick="prevStep()">← Back</button>
            <button class="btn" id="submitBtn" onclick="submitSignUp()">
                <span id="btnText">Create Account</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </div>
    </div>
</div>

<script src="shared.js"></script>
<script>
  redirectIfLoggedIn();

  function nextStep() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value;
    const c = document.getElementById("confirm").value;
    const f = document.getElementById("firstName").value.trim();
    const l = document.getElementById("lastName").value.trim();
    if (!u || !p || !c || !f || !l) { showError("Please fill in all account details."); return; }
    if (p !== c) { showError("Passwords do not match."); return; }
    if (p.length < 8) { showError("Password must be at least 8 characters."); return; }
    hideError();
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
    document.getElementById("p2").classList.add("active");
  }

  function prevStep() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
    document.getElementById("p2").classList.remove("active");
    hideError();
  }

  async function submitSignUp() {
    const streetNumber = document.getElementById("streetNumber").value.trim();
    const streetName   = document.getElementById("streetName").value.trim();
    const city         = document.getElementById("city").value.trim();
    const country      = document.getElementById("country").value.trim();
    const postalCode   = document.getElementById("postalCode").value.trim();
    if (!streetNumber || !streetName || !city || !country || !postalCode) {
      showError("Please fill in all address fields."); return;
    }
    hideError();
    const btn = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const spinner = document.getElementById("spinner");
    btn.disabled = true;
    btnText.textContent = "Creating...";
    spinner.style.display = "block";

    const payload = {
      username:     document.getElementById("username").value.trim(),
      password:     document.getElementById("password").value,
      firstName:    document.getElementById("firstName").value.trim(),
      lastName:     document.getElementById("lastName").value.trim(),
      streetNumber, streetName, city, country, postalCode
    };

    try {
      const res = await apiFetch("/signup", { method: "POST", body: JSON.stringify(payload) });
      const data = await res.json();
      if (res.ok && data.success) {
        const sb = document.getElementById("successBox");
        sb.textContent = "Account created! Redirecting to sign in...";
        sb.style.display = "block";
        setTimeout(() => window.location.href = "signin.html", 1800);
      } else {
        showError(data.message || "Sign up failed. Username may already exist.");
      }
    } catch (e) {
      showError("Cannot connect to server.");
    } finally {
      btn.disabled = false;
      btnText.textContent = "Create Account";
      spinner.style.display = "none";
    }
  }

  function showError(msg) {
    const b = document.getElementById("errorBox");
    b.textContent = msg; b.style.display = "block";
  }
  function hideError() { document.getElementById("errorBox").style.display = "none"; }
</script>
</body>
</html>
